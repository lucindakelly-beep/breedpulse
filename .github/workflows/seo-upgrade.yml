name: SEO Auto-Upgrade

on:
  push:
    paths:
      - 'stallions/**'
      - 'scripts/seo-upgrade.mjs'
      - 'scripts/foal-namer-snippet.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO upgrade script
        run: node scripts/seo-upgrade.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage everything modified by the script
          git add -A

          # Skip if no changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto: SEO upgrade (GA4 + sitemap + schema) [skip ci]"

          # Retry push up to 3 times in case the branch moved while we worked
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing and retrying..."
            git pull --rebase origin main
          done

          echo "Push failed after 3 attempts"
          exit 1
