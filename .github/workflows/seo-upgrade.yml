name: SEO Auto-Upgrade

on:
  push:
    branches: [main]
    paths:
      - 'stallions/**'
      - 'all-stallions.html'
      - 'index.html'
      - 'pricing.html'
      - 'how-it-works.html'
      - 'submit-your-stallion.html'
      - '.github/workflows/seo-upgrade.yml'
      - 'scripts/seo-upgrade.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO upgrade script
        run: node scripts/seo-upgrade.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No SEO changes to commit."
          else
            git commit -m "Auto: SEO upgrade (GA4 + sitemap + schema) [skip ci]"
            git push
          fi
